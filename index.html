<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>매수·매도 타이밍 신호 분석</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
:root{
  --bg:#0a0c0f;--surface:#111418;--surface2:#1a1f26;--border:#232830;
  --accent:#00e5a0;--accent2:#0084ff;--danger:#ff4757;--warn:#ffa502;
  --text:#e8edf2;--text2:#7a8899;--text3:#3d4a58;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:13px;min-height:100vh;}

/* ── 헤더 ── */
header{border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;gap:14px;background:var(--surface);}
.logo{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;color:var(--accent);letter-spacing:3px;}
.htitle{font-size:14px;font-weight:500;color:var(--text2);}
.sep{color:var(--text3);}
.hbadge{font-family:'IBM Plex Mono',monospace;font-size:9px;padding:3px 8px;border-radius:3px;background:rgba(0,229,160,.1);color:var(--accent);border:1px solid rgba(0,229,160,.2);margin-left:auto;}

/* ── 탭 ── */
.tab-bar{display:flex;border-bottom:1px solid var(--border);background:var(--surface);}
.tab{padding:12px 24px;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1px;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;}
.tab:hover{color:var(--text2);}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}

/* ── 레이아웃 ── */
.app{display:grid;grid-template-columns:300px 1fr;min-height:calc(100vh - 97px);}
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:22px;display:flex;flex-direction:column;gap:18px;overflow-y:auto;}
.main{padding:26px 30px;overflow-y:auto;}

/* ── 공통 폼 ── */
.section-label{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin-bottom:8px;}
.param-grid{display:flex;flex-direction:column;gap:7px;}
.param-row{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.param-item label{display:block;font-size:10px;color:var(--text2);margin-bottom:3px;font-family:'IBM Plex Mono',monospace;}
.param-item input,.param-item select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:7px 10px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:11px;transition:border-color .2s;}
.param-item input:focus,.param-item select:focus{outline:none;border-color:var(--accent);}

/* ── 버튼 ── */
.run-btn{background:var(--accent);color:#000;border:none;border-radius:5px;padding:11px;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;letter-spacing:1.5px;cursor:pointer;transition:all .2s;text-transform:uppercase;width:100%;}
.run-btn:hover{background:#00ffb3;transform:translateY(-1px);}
.run-btn:disabled{background:var(--text3);color:var(--surface);cursor:not-allowed;transform:none;}
.sec-btn{background:transparent;color:var(--text2);border:1px solid var(--border);border-radius:5px;padding:9px;font-family:'IBM Plex Mono',monospace;font-size:10px;cursor:pointer;transition:all .2s;width:100%;margin-top:6px;}
.sec-btn:hover{border-color:var(--accent);color:var(--accent);}

/* ── 업로드 ── */
.upload-zone{border:1px dashed var(--border);border-radius:6px;padding:16px;text-align:center;cursor:pointer;transition:all .2s;position:relative;}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:rgba(0,229,160,.04);}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.upload-icon{font-size:20px;margin-bottom:4px;}
.upload-text{color:var(--text2);font-size:11px;line-height:1.7;}
.upload-text span{color:var(--accent);}
.upload-hint{font-size:9px;color:var(--text3);margin-top:4px;font-family:'IBM Plex Mono',monospace;}
.file-info{background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:8px 12px;font-family:'IBM Plex Mono',monospace;font-size:10px;margin-top:8px;}
.file-info .fname{color:var(--accent);font-weight:600;}
.file-info .fmeta{color:var(--text3);margin-top:3px;}

/* ── 컬럼 매핑 ── */
.col-map{background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:10px;display:flex;flex-direction:column;gap:6px;}
.col-row{display:grid;grid-template-columns:72px 1fr;align-items:center;gap:6px;}
.col-row label{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text2);}
.col-row input{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:5px 8px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:11px;width:100%;}
.col-row input:focus{outline:none;border-color:var(--accent);}

/* ── 수동 입력 ── */
.manual-box{background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:12px;display:flex;flex-direction:column;gap:8px;}
.manual-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.manual-item label{display:block;font-size:10px;color:var(--text2);margin-bottom:3px;font-family:'IBM Plex Mono',monospace;}
.manual-item input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:6px 8px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:11px;}
.manual-item input:focus{outline:none;border-color:var(--accent);}
.add-btn{background:rgba(0,229,160,.08);border:1px solid rgba(0,229,160,.2);border-radius:4px;padding:7px;color:var(--accent);font-family:'IBM Plex Mono',monospace;font-size:10px;cursor:pointer;width:100%;transition:all .2s;}
.add-btn:hover{background:rgba(0,229,160,.15);}
.manual-list{display:flex;flex-direction:column;gap:4px;max-height:160px;overflow-y:auto;}
.manual-item-row{display:flex;align-items:center;justify-content:space-between;padding:5px 8px;background:var(--bg);border-radius:4px;font-family:'IBM Plex Mono',monospace;font-size:10px;}
.manual-item-row .mcode{color:var(--warn);font-weight:600;}
.manual-item-row .mval{color:var(--text2);}
.manual-item-row .mdel{color:var(--text3);cursor:pointer;font-size:12px;}
.manual-item-row .mdel:hover{color:var(--danger);}

/* ── 결과 영역 ── */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;color:var(--text3);gap:12px;text-align:center;}
.empty-state .big{font-size:40px;}

/* 요약 카드 */
.summary-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px;}
.scard{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:14px 18px;}
.slabel{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1.5px;color:var(--text3);text-transform:uppercase;margin-bottom:6px;}
.sval{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:600;}
.ssub{font-size:10px;color:var(--text2);margin-top:3px;}

/* 대시보드 */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:22px;}
.signal-section{background:var(--surface);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.signal-header{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:1px solid var(--border);}
.signal-header h3{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1px;text-transform:uppercase;}
.buy-hdr h3{color:var(--accent);}
.sell-hdr h3{color:var(--danger);}
.signal-count{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;}

.signal-cards{padding:10px;display:flex;flex-direction:column;gap:7px;max-height:320px;overflow-y:auto;}
.sig-card{background:var(--surface2);border-radius:5px;padding:11px 14px;display:grid;grid-template-columns:1fr auto;gap:8px;border-left:3px solid transparent;cursor:default;}
.sig-card.buy-card{border-left-color:var(--accent);}
.sig-card.sell-card{border-left-color:var(--danger);}
.sname{font-weight:600;font-size:12px;color:var(--warn);font-family:'IBM Plex Mono',monospace;}
.smetrics{display:flex;gap:8px;margin-top:5px;flex-wrap:wrap;}
.sm{font-family:'IBM Plex Mono',monospace;font-size:10px;}
.mk{color:var(--text3);}
.sprice{text-align:right;}
.sprice .price{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:600;}
.sprice .pchg{font-family:'IBM Plex Mono',monospace;font-size:10px;margin-top:2px;}

/* 게이지 */
.gauge-wrap{display:flex;align-items:center;gap:6px;margin-top:5px;}
.gauge-bar{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.gauge-fill{height:100%;border-radius:2px;transition:width .3s;}
.gauge-fill.buy{background:linear-gradient(90deg,var(--accent2),var(--accent));}
.gauge-fill.sell{background:linear-gradient(90deg,var(--warn),var(--danger));}
.gauge-label{font-family:'IBM Plex Mono',monospace;font-size:10px;white-space:nowrap;}

/* 상세 테이블 */
.table-section{background:var(--surface);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.table-header{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px;}
.table-header h3{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1px;color:var(--text2);text-transform:uppercase;}
.tcontrols{display:flex;gap:6px;}
.tbtn{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:4px 10px;color:var(--text2);font-size:11px;cursor:pointer;font-family:'IBM Plex Mono',monospace;transition:all .15s;}
.tbtn:hover{border-color:var(--accent);color:var(--accent);}
.tbtn.active{border-color:var(--accent);color:var(--accent);}
.tbtn.sell-act{border-color:var(--danger)!important;color:var(--danger)!important;}

table{width:100%;border-collapse:collapse;}
thead tr{background:var(--surface2);}
th{padding:9px 11px;text-align:left;font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--text3);text-transform:uppercase;white-space:nowrap;cursor:pointer;user-select:none;}
th:hover{color:var(--text2);}
td{padding:8px 11px;border-bottom:1px solid var(--border);font-family:'IBM Plex Mono',monospace;font-size:11px;white-space:nowrap;}
tbody tr:hover{background:rgba(255,255,255,.02);}
tbody tr:last-child td{border-bottom:none;}

.badge{display:inline-block;padding:2px 7px;border-radius:3px;font-size:9px;font-weight:600;}
.badge-buy{background:rgba(0,229,160,.12);color:var(--accent);}
.badge-sell{background:rgba(255,71,87,.12);color:var(--danger);}

/* 조건 태그 */
.ctag{font-size:9px;padding:1px 5px;border-radius:2px;font-family:'IBM Plex Mono',monospace;}
.ctag-ok{background:rgba(0,229,160,.1);color:var(--accent);}
.ctag-fail{background:rgba(255,71,87,.06);color:var(--text3);}

/* 색상 */
.buy-c{color:var(--accent);}
.sell-c{color:var(--danger);}
.warn-c{color:var(--warn);}
.neu-c{color:var(--text);}
.blue-c{color:var(--accent2);}
.dim-c{color:var(--text2);}

/* 프로그레스 */
.progress-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;}
.progress-bar{width:300px;height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.progress-fill-anim{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .1s;}
.progress-label{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text2);}

.err-box{background:rgba(255,71,87,.08);border:1px solid var(--danger);border-radius:5px;padding:8px 12px;font-size:11px;color:var(--danger);font-family:'IBM Plex Mono',monospace;}

::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--surface);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>

<header>
  <div class="logo">SIGNAL</div>
  <div class="sep">/</div>
  <div class="htitle">매수·매도 타이밍 신호 분석 시스템</div>
  <div class="hbadge">MA + RSI · 현재 시점</div>
</header>

<!-- 탭 -->
<div class="tab-bar">
  <div class="tab active" id="tab-file" onclick="switchTab('file')">📂 파일 업로드</div>
  <div class="tab" id="tab-manual" onclick="switchTab('manual')">✏️ 직접 입력</div>
</div>

<div class="app">
  <!-- ══════════════ 사이드바 ══════════════ -->
  <div class="sidebar">

    <!-- ── 파일 업로드 탭 ── -->
    <div id="panel-file">
      <div>
        <div class="section-label">데이터 업로드</div>
        <div class="upload-zone" id="uploadZone">
          <input type="file" id="fileInput" accept=".xlsx,.xls,.csv">
          <div class="upload-icon">📂</div>
          <div class="upload-text">파일 드래그 또는<br><span>클릭하여 선택</span></div>
          <div class="upload-hint">.xlsx · .xls · .csv</div>
        </div>
        <div id="fileInfo"></div>
      </div>

      <div>
        <div class="section-label">컬럼 설정</div>
        <div class="col-map">
          <div class="col-row"><label>날짜</label><input type="text" id="col_date" value="날짜"></div>
          <div class="col-row"><label>종목코드</label><input type="text" id="col_code" value="종목코드"></div>
          <div class="col-row"><label>종가</label><input type="text" id="col_close" value="종가"></div>
          <div class="col-row"><label>거래량</label><input type="text" id="col_vol" value="거래량"></div>
        </div>
      </div>
    </div>

    <!-- ── 직접 입력 탭 ── -->
    <div id="panel-manual" style="display:none">
      <div>
        <div class="section-label">종목 추가</div>
        <div class="manual-box">
          <div class="manual-row">
            <div class="manual-item">
              <label>종목코드</label>
              <input type="text" id="m_code" placeholder="005930" maxlength="6">
            </div>
            <div class="manual-item">
              <label>현재가</label>
              <input type="number" id="m_price" placeholder="71500">
            </div>
          </div>
          <div style="font-size:9px;color:var(--text3);font-family:'IBM Plex Mono',monospace;line-height:1.7">
            ※ 직접 입력 시 현재가 기준으로<br>MA·RSI 없이 ATR 기반 신호 계산
          </div>
          <button class="add-btn" onclick="addManual()">+ 종목 추가</button>
          <div class="manual-list" id="manualList"></div>
        </div>
      </div>
    </div>

    <!-- ── 공통: 지표 설정 ── -->
    <div>
      <div class="section-label">MA 설정</div>
      <div class="param-grid">
        <div class="param-row">
          <div class="param-item"><label>MA_FAST</label><input type="number" id="p_maf" value="5"></div>
          <div class="param-item"><label>MA_SIGNAL</label><input type="number" id="p_mas" value="20"></div>
        </div>
        <div class="param-row">
          <div class="param-item"><label>MA_TREND</label><input type="number" id="p_mat" value="60"></div>
          <div class="param-item"><label>ATR 기간</label><input type="number" id="p_atr" value="14"></div>
        </div>
        <div class="param-row">
          <div class="param-item"><label>ATR 손절배수</label><input type="number" id="p_atrm" value="0.5" step="0.1"></div>
          <div class="param-item"><label>손익비 R:R</label><input type="number" id="p_rr" value="2" step="0.5"></div>
        </div>
      </div>
    </div>

    <div>
      <div class="section-label">RSI 설정</div>
      <div class="param-grid">
        <div class="param-row">
          <div class="param-item"><label>RSI 기간</label><input type="number" id="p_rsin" value="14"></div>
          <div class="param-item"><label>매수 상한</label><input type="number" id="p_rsib" value="60"></div>
        </div>
        <div class="param-row">
          <div class="param-item"><label>과매수 기준</label><input type="number" id="p_rsiob" value="70"></div>
          <div class="param-item"><label>과매도 기준</label><input type="number" id="p_rsios" value="40"></div>
        </div>
      </div>
    </div>

    <button class="run-btn" id="scanBtn" disabled>▶ 신호 분석 실행</button>
  </div>

  <!-- ══════════════ 메인 ══════════════ -->
  <div class="main" id="mainArea">
    <div class="empty-state">
      <div class="big">📡</div>
      <p style="line-height:2">파일 업로드 또는 종목 직접 입력 후<br>신호 분석을 실행하세요</p>
      <p style="font-size:11px;color:var(--text3);line-height:2.2;font-family:'IBM Plex Mono',monospace">
        매수 신호 — MA 눌림목 + RSI 필터<br>
        매도 신호 — MA 이탈 + RSI 과매수<br>
        손절가·목표가 — ATR 기반 자동 계산
      </p>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════
// 전역 상태
// ══════════════════════════════════
let rawData    = {};   // 파일 데이터
let manualData = [];   // 수동 입력 [{code, price}]
let activeTab  = 'file';
let buySignals = [], sellSignals = [];
let tableData  = [], sortCol = null, sortAsc = true;

// ══════════════════════════════════
// 탭 전환
// ══════════════════════════════════
function switchTab(t) {
  activeTab = t;
  document.getElementById('tab-file').classList.toggle('active', t==='file');
  document.getElementById('tab-manual').classList.toggle('active', t==='manual');
  document.getElementById('panel-file').style.display   = t==='file'   ? '' : 'none';
  document.getElementById('panel-manual').style.display = t==='manual' ? '' : 'none';
  updateRunBtn();
}

function updateRunBtn() {
  const hasFile   = Object.keys(rawData).length > 0;
  const hasManual = manualData.length > 0;
  document.getElementById('scanBtn').disabled = !(hasFile || hasManual);
}

// ══════════════════════════════════
// 파일 업로드
// ══════════════════════════════════
const uploadZone = document.getElementById('uploadZone');
const fileInput  = document.getElementById('fileInput');
uploadZone.addEventListener('dragover', e=>{e.preventDefault();uploadZone.classList.add('drag');});
uploadZone.addEventListener('dragleave', ()=>uploadZone.classList.remove('drag'));
uploadZone.addEventListener('drop', e=>{e.preventDefault();uploadZone.classList.remove('drag');if(e.dataTransfer.files[0])loadFile(e.dataTransfer.files[0]);});
fileInput.addEventListener('change', e=>{if(e.target.files[0])loadFile(e.target.files[0]);});

function loadFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  const reader = new FileReader();
  if (ext==='csv') {
    reader.onload = e=>parseAndStore(e.target.result.trim().split('\n').map(l=>l.split(',')), file.name);
    reader.readAsText(file,'UTF-8');
  } else {
    reader.onload = e=>{
      try {
        const wb=XLSX.read(e.target.result,{type:'array'});
        const csv=XLSX.utils.sheet_to_csv(wb.Sheets[wb.SheetNames[0]],{blankrows:false});
        parseAndStore(csv.trim().split('\n').map(l=>l.split(',')), file.name);
      } catch(err){showErr('파일 오류: '+err.message);}
    };
    reader.readAsArrayBuffer(file);
  }
}

function parseAndStore(rows2d, fname) {
  const colDate  = document.getElementById('col_date').value.trim();
  const colCode  = document.getElementById('col_code').value.trim();
  const colClose = document.getElementById('col_close').value.trim();
  const colVol   = document.getElementById('col_vol').value.trim();
  const header   = rows2d[0].map(h=>h.trim().replace(/"/g,''));
  const idx      = k=>header.findIndex(h=>h===k);
  const di=idx(colDate), ci=idx(colCode), li=idx(colClose), vi=idx(colVol);
  if(di<0||ci<0||li<0){showErr(`컬럼 오류. 헤더: ${header.join(', ')}`);return;}
  rawData={};
  let total=0;
  for(let i=1;i<rows2d.length;i++){
    const c=rows2d[i].map(v=>(v||'').trim().replace(/"/g,''));
    if(!c[di]||!c[ci]||!c[li]) continue;
    let code=c[ci].replace(/^A/,'').replace(/\.[A-Z]+$/,'').replace(/[^0-9]/g,'');
    if(!code) continue;
    code=code.padStart(6,'0');
    const close=parseFloat(c[li].replace(/[^0-9.]/g,''));
    const vol=vi>=0?parseFloat(c[vi].replace(/[^0-9.]/g,'')):0;
    if(isNaN(close)||close<=0) continue;
    if(!rawData[code]) rawData[code]=[];
    rawData[code].push({date:c[di],close,volume:isNaN(vol)?0:vol});
    total++;
  }
  Object.keys(rawData).forEach(k=>rawData[k].sort((a,b)=>a.date.localeCompare(b.date)));
  const n=Object.keys(rawData).length;
  if(n===0){showErr('파싱 실패. 컬럼명을 확인하세요.');return;}
  document.getElementById('fileInfo').innerHTML=`<div class="file-info"><div class="fname">${fname}</div><div class="fmeta">${n.toLocaleString()}개 종목 · ${total.toLocaleString()}행</div></div>`;
  updateRunBtn();
}

function showErr(msg){document.getElementById('fileInfo').innerHTML=`<div class="err-box">${msg}</div>`;}

// ══════════════════════════════════
// 지표 계산
// ══════════════════════════════════
const calcMA=(arr,n)=>arr.map((_,i)=>i<n-1?null:arr.slice(i-n+1,i+1).reduce((a,b)=>a+b,0)/n);
const calcATR=(data,n)=>{
  const tr=data.map((d,i)=>i===0?0:Math.abs(d.close-data[i-1].close));
  return tr.map((_,i)=>i<n-1?null:tr.slice(i-n+1,i+1).reduce((a,b)=>a+b,0)/n);
};
function calcRSI(closes,n){
  const rsi=new Array(closes.length).fill(null);
  if(closes.length<n+1) return rsi;
  let g=0,l=0;
  for(let i=1;i<=n;i++){const d=closes[i]-closes[i-1];d>=0?g+=d:l-=d;}
  let ag=g/n,al=l/n;
  rsi[n]=al===0?100:100-100/(1+ag/al);
  for(let i=n+1;i<closes.length;i++){
    const d=closes[i]-closes[i-1];
    ag=(ag*(n-1)+Math.max(d,0))/n;
    al=(al*(n-1)+Math.max(-d,0))/n;
    rsi[i]=al===0?100:100-100/(1+ag/al);
  }
  return rsi;
}

// ══════════════════════════════════
// 신호 분석 엔진
// ══════════════════════════════════
function runScan() {
  const maF   = +document.getElementById('p_maf').value;
  const maS   = +document.getElementById('p_mas').value;
  const maT   = +document.getElementById('p_mat').value;
  const atrN  = +document.getElementById('p_atr').value;
  const atrM  = +document.getElementById('p_atrm').value;
  const rr    = +document.getElementById('p_rr').value;
  const rsiN  = +document.getElementById('p_rsin').value;
  const rsiBuy= +document.getElementById('p_rsib').value;
  const rsiOB = +document.getElementById('p_rsiob').value;
  const rsiOS = +document.getElementById('p_rsios').value;

  buySignals=[]; sellSignals=[];

  // ── 파일 데이터 분석 ──
  Object.entries(rawData).forEach(([code, data])=>{
    const minLen = Math.max(maT, rsiN) + 5;
    if(data.length < minLen) return;

    const closes = data.map(d=>d.close);
    const vols   = data.map(d=>d.volume);
    const maf = calcMA(closes, maF);
    const mas = calcMA(closes, maS);
    const mat = calcMA(closes, maT);
    const at  = calcATR(data, atrN);
    const v20 = calcMA(vols, 20);
    const rsi = calcRSI(closes, rsiN);

    const L=data.length-1, L1=L-1;
    if(!mat[L]||!mas[L]||!maf[L]||!at[L]||!rsi[L]) return;

    const price  = data[L].close;
    const prev   = data[L1]?.close || price;
    const chgPct = ((price-prev)/prev*100).toFixed(2);

    // 매수 조건
    const bc=[
      mat[L] > (mat[L-5]||mat[L])*1.001,            // 60MA 우상향
      maf[L] > mas[L] && mas[L] > mat[L],            // 정배열
      price >= mas[L]*0.97 && price <= mas[L]*1.06,  // 눌림
      (prev<=mas[L1]*1.01 && price>mas[L]),           // 돌파
      rsi[L] < rsiBuy,                               // RSI 필터
      !v20[L] || data[L].volume >= v20[L]*0.7,       // 거래량
    ];
    const buyScore = bc.filter(Boolean).length;

    // 매도 조건
    const sc=[
      mat[L] < (mat[L-5]||mat[L])*0.999,            // 60MA 하향
      maf[L] < mas[L] || mas[L] < mat[L],            // 역배열
      price < mas[L],                                // MA이탈
      rsi[L] > rsiOB,                                // RSI 과매수
      v20[L] && data[L].volume > v20[L]*1.5 && price < prev, // 거래량급증+하락
    ];
    const sellScore = sc.filter(Boolean).length;

    const stopBuy  = mas[L] - at[L]*atrM;
    const stopSell = mas[L] + at[L]*atrM;
    const distBuy  = price - stopBuy;
    const distSell = stopSell - price;

    const base = {
      code, price, chgPct,
      rsi:rsi[L].toFixed(1),
      atr:at[L].toFixed(0),
      ma5:maf[L].toFixed(0), ma20:mas[L].toFixed(0), ma60:mat[L].toFixed(0),
      source:'file',
    };

    if(buyScore===6){
      buySignals.push({...base, type:'BUY', score:buyScore, maxScore:6,
        stop:stopBuy.toFixed(0), target:(price+distBuy*rr).toFixed(0),
        stopPct:(distBuy/price*100).toFixed(1),
        conds:bc, condLabels:['60MA↑','정배열','눌림','돌파','RSI<'+rsiBuy,'거래량'],
      });
    }
    if(sellScore>=3 && sc[2]){
      sellSignals.push({...base, type:'SELL', score:sellScore, maxScore:5,
        stop:stopSell.toFixed(0), target:(price-distSell*rr).toFixed(0),
        stopPct:(distSell/price*100).toFixed(1),
        conds:sc, condLabels:['60MA↓','역배열','MA이탈','RSI>'+rsiOB,'거래량↑하락'],
      });
    }
  });

  // ── 수동 입력 분석 (ATR 기반 손절·목표만 계산) ──
  manualData.forEach(({code, price})=>{
    const atrEst = price * 0.015; // 가격의 1.5% 추정 ATR
    const atrM2  = +document.getElementById('p_atrm').value;
    const stop   = price - atrEst * atrM2;
    const dist   = price - stop;
    const target = price + dist * rr;

    // 단순 ATR 기반 — 매수 신호로 등록 (데이터 부족으로 조건 미계산)
    buySignals.push({
      code, price, chgPct:'−',
      rsi:'−', atr:atrEst.toFixed(0),
      ma5:'−', ma20:'−', ma60:'−',
      type:'BUY', score:'수동', maxScore:6,
      stop:stop.toFixed(0), target:target.toFixed(0),
      stopPct:(dist/price*100).toFixed(1),
      conds:[], condLabels:[],
      source:'manual',
    });
  });

  buySignals.sort((a,b)=>typeof b.score==='number'&&typeof a.score==='number'?b.score-a.score:0);
  sellSignals.sort((a,b)=>typeof b.score==='number'&&typeof a.score==='number'?b.score-a.score:0);
  tableData=[...buySignals,...sellSignals];
  renderResults();
}

// ══════════════════════════════════
// 결과 렌더링

      </div>
      <div class="scard">
        <div class="slabel">매수 신호</div>
        <div class="sval buy-c">${buySignals.length}</div>
        <div class="ssub">조건 충족 종목</div>
      </div>
      <div class="scard">
        <div class="slabel">매도 신호</div>
        <div class="sval sell-c">${sellSignals.length}</div>

      </div>

        <div class="slabel">신호 비율</div>

    </div>

    <div class="dash-grid">

        </div>
        <div class="signal-cards">
          ${buySignals.length===0
            ?'<div style="padding:20px;text-align:center;color:var(--text3);font-size:11px;font-family:\'IBM Plex Mono\',monospace">매수 신호 없음</div>'
            :buySignals.map(s=>renderCard(s,'buy')).join('')}

      </div>
      <div class="signal-section">
        <div class="signal-header sell-hdr">
          <h3>▼ 매도 타이밍</h3>
          <span class="signal-count sell-c">${sellSignals.length}종목</span>
        </div>
        <div class="signal-cards">
          ${sellSignals.length===0
            ?'<div style="padding:20px;text-align:center;color:var(--text3);font-size:11px;font-family:\'IBM Plex Mono\',monospace">매도 신호 없음</div>'
            :sellSignals.map(s=>renderCard(s,'sell')).join('')}
        </div>
      </div>
    </div>

    <div class="table-section">
      <div class="table-header">
        <h3>전체 신호 상세</h3>
        <div class="tcontrols">
          <button class="tbtn active" onclick="filterT('all',this)">전체</button>
          <button class="tbtn" onclick="filterT('BUY',this)">매수</button>
          <button class="tbtn" onclick="filterT('SELL',this)">매도</button>
        </div>
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead><tr>
            <th onclick="sortT('type')">신호</th>
            <th onclick="sortT('code')">종목코드</th>
            <th onclick="sortT('price')">현재가</th>
            <th onclick="sortT('chgPct')">등락%</th>
            <th onclick="sortT('rsi')">RSI</th>
            <th onclick="sortT('atr')">ATR</th>
            <th onclick="sortT('ma20')">MA20</th>
            <th onclick="sortT('ma60')">MA60</th>
            <th onclick="sortT('stop')">손절가</th>
            <th onclick="sortT('stopPct')">손절%</th>
            <th onclick="sortT('target')">목표가</th>
            <th onclick="sortT('score')">신호강도</th>
            <th>조건</th>
          </tr></thead>
          <tbody id="tBody"></tbody>
        </table>
      </div>
    </div>`;

  renderTable(tableData);
}

function renderCard(s, type) {
  const isBuy = type==='buy';
  const scoreNum = typeof s.score==='number' ? s.score : null;
  const maxScore = s.maxScore||6;
  const gaugePct = scoreNum!==null ? (scoreNum/maxScore*100) : 100;
  const chgColor = parseFloat(s.chgPct)>=0?'var(--accent)':'var(--danger)';
  const priceColor = isBuy?'var(--accent)':'var(--danger)';

  return `<div class="sig-card ${isBuy?'buy-card':'sell-card'}">
    <div>
      <div class="sname">${s.code}${s.source==='manual'?' <span style="color:var(--text3);font-size:9px">[수동]</span>':''}</div>
      <div class="smetrics">
        <span class="sm"><span class="mk">RSI </span><span style="color:${isBuy?'var(--accent)':'var(--danger)'}">${s.rsi}</span></span>
        <span class="sm"><span class="mk">ATR </span><span class="warn-c">${Number(s.atr).toLocaleString()}</span></span>
        <span class="sm"><span class="mk">손절 </span><span class="sell-c">${Number(s.stop).toLocaleString()}</span></span>
        <span class="sm"><span class="mk">목표 </span><span class="buy-c">${Number(s.target).toLocaleString()}</span></span>
      </div>
      <div class="gauge-wrap">
        <div class="gauge-bar"><div class="gauge-fill ${isBuy?'buy':'sell'}" style="width:${gaugePct}%"></div></div>
        <span class="gauge-label ${isBuy?'buy-c':'sell-c'}">${scoreNum!==null?scoreNum+'/'+maxScore:'수동'}</span>
      </div>
    </div>
    <div class="sprice">
      <div class="price" style="color:${priceColor}">${Number(s.price).toLocaleString()}</div>
      <div class="pchg" style="color:${chgColor}">${s.chgPct!=='−'?(parseFloat(s.chgPct)>=0?'+':'')+s.chgPct+'%':'−'}</div>
    </div>
  </div>`;
}

function filterT(type, btn) {
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('active','sell-act'));
  btn.classList.add(type==='SELL'?'sell-act':'active');
  let f=tableData;
  if(type==='BUY')  f=tableData.filter(t=>t.type==='BUY');
  if(type==='SELL') f=tableData.filter(t=>t.type==='SELL');
  renderTable(f);
}

function sortT(col) {
  if(sortCol===col) sortAsc=!sortAsc; else{sortCol=col;sortAsc=true;}
  const cur=document.getElementById('tBody').__data||tableData;
  cur.sort((a,b)=>{
    let va=a[col],vb=b[col];
    if(va==='−') va=sortAsc?Infinity:-Infinity;
    if(vb==='−') vb=sortAsc?Infinity:-Infinity;
    if(typeof va==='string'&&!isNaN(va)) va=parseFloat(va);
    if(typeof vb==='string'&&!isNaN(vb)) vb=parseFloat(vb);
    if(typeof va==='string') return sortAsc?va.localeCompare(vb):vb.localeCompare(va);
    return sortAsc?va-vb:vb-va;
  });
  renderTable(cur);
}

function renderTable(data) {
  const tbody=document.getElementById('tBody');
  if(!tbody) return;
  tbody.__data=data;
  tbody.innerHTML=data.map(t=>{
    const isBuy=t.type==='BUY';
    const chgCls=t.chgPct==='−'?'dim-c':parseFloat(t.chgPct)>=0?'buy-c':'sell-c';
    const rsiNum=parseFloat(t.rsi);
    const rsiCls=isNaN(rsiNum)?'dim-c':rsiNum>70?'sell-c':rsiNum<40?'buy-c':'neu-c';
    const scoreNum=typeof t.score==='number'?t.score:null;
    const gPct=scoreNum!==null?(scoreNum/t.maxScore*100):100;
    const tags=t.condLabels.map((l,i)=>`<span class="ctag ${t.conds[i]?'ctag-ok':'ctag-fail'}">${l}</span>`).join('');
    return `<tr>
      <td><span class="badge ${isBuy?'badge-buy':'badge-sell'}">${isBuy?'▲ 매수':'▼ 매도'}</span></td>
      <td class="warn-c" style="font-weight:600">${t.code}${t.source==='manual'?' <span style="color:var(--text3);font-size:9px">[수]</span>':''}</td>
      <td class="${isBuy?'buy-c':'sell-c'}" style="font-weight:600">${Number(t.price).toLocaleString()}</td>
      <td class="${chgCls}">${t.chgPct==='−'?'−':(parseFloat(t.chgPct)>=0?'+':'')+t.chgPct+'%'}</td>
      <td class="${rsiCls}">${t.rsi}</td>
      <td class="warn-c">${Number(t.atr).toLocaleString()}</td>
      <td class="dim-c">${t.ma20==='−'?'−':Number(t.ma20).toLocaleString()}</td>
      <td class="dim-c">${t.ma60==='−'?'−':Number(t.ma60).toLocaleString()}</td>
      <td class="sell-c">${Number(t.stop).toLocaleString()}</td>
      <td class="sell-c">${t.stopPct}%</td>
      <td class="buy-c">${Number(t.target).toLocaleString()}</td>
      <td>
        <div style="display:flex;align-items:center;gap:6px">
          <div style="width:50px;height:3px;background:var(--border);border-radius:2px;overflow:hidden">
            <div style="width:${gPct}%;height:100%;background:${isBuy?'var(--accent)':'var(--danger)'};border-radius:2px"></div>
          </div>
          <span class="${isBuy?'buy-c':'sell-c'}" style="font-size:10px">${scoreNum!==null?scoreNum+'/'+t.maxScore:'수동'}</span>
        </div>
      </td>
      <td>${tags||'<span class="dim-c">−</span>'}</td>
    </tr>`;
  }).join('');
}

// ══════════════════════════════════
// 실행 버튼
// ══════════════════════════════════
document.getElementById('scanBtn').addEventListener('click', ()=>{
  const hasFile=Object.keys(rawData).length>0;
  const hasManual=manualData.length>0;
  if(!hasFile&&!hasManual) return;

  document.getElementById('mainArea').innerHTML=`
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill-anim" id="prog" style="width:0%"></div></div>
      <div class="progress-label" id="progLbl">신호 분석 중...</div>
    </div>`;

  let pct=0;
  const total=Object.keys(rawData).length+manualData.length;
  const iv=setInterval(()=>{
    pct=Math.min(pct+8,88);
    const el=document.getElementById('prog');if(el)el.style.width=pct+'%';
    const lb=document.getElementById('progLbl');
    if(lb)lb.textContent=`${total.toLocaleString()}개 종목 분석 중... (${pct}%)`;
  },60);
  setTimeout(()=>{clearInterval(iv);runScan();},500);
});
