name: Stock Scanner

on:
  schedule:
    - cron: "0 7 * * 1-5"  # 평일 실행 (UTC 기준)
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v3

      - name: Python 설치
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: 라이브러리 설치
        run: pip install -r requirements.txt

      - name: 스캐너 실행
        run: python scanner.py

      - name: 결과 업로드
        uses: actions/upload-artifact@v4
        with:
          name: scan-result
          path: result.csv
